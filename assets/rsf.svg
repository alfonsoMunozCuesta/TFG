<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Random survival forest workflow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef4f8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1abc9c"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#173042" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#5f7d8b"/>
    </marker>
  </defs>

  <rect width="640" height="360" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="28" y="22" width="584" height="316" rx="22" fill="#ffffff"/>
  </g>

  <text x="320" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f3b4d">Random Survival Forest</text>
  <text x="320" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f7d8b">Bootstrap samples + random feature splits + survival aggregation</text>

  <g font-family="Arial, sans-serif" font-weight="700" text-anchor="middle" fill="#1f3b4d">
    <rect x="48" y="110" width="108" height="62" rx="16" fill="#e8f8f5" stroke="#1abc9c" stroke-width="2"/>
    <text x="102" y="137" font-size="15">Data</text>
    <text x="102" y="154" font-size="11" fill="#5f7d8b" font-weight="400">censored time + features</text>

    <rect x="180" y="110" width="108" height="62" rx="16" fill="#eef6fc" stroke="#2980b9" stroke-width="2"/>
    <text x="234" y="137" font-size="15">Bootstrap</text>
    <text x="234" y="154" font-size="11" fill="#5f7d8b" font-weight="400">resampled subsets</text>

    <rect x="312" y="110" width="108" height="62" rx="16" fill="#fff4e8" stroke="#f39c12" stroke-width="2"/>
    <text x="366" y="137" font-size="15">Trees</text>
    <text x="366" y="154" font-size="11" fill="#5f7d8b" font-weight="400">random splits</text>

    <rect x="444" y="110" width="108" height="62" rx="16" fill="#f2ebff" stroke="#8e44ad" stroke-width="2"/>
    <text x="498" y="137" font-size="15">Aggregate</text>
    <text x="498" y="154" font-size="11" fill="#5f7d8b" font-weight="400">ensemble prediction</text>
  </g>

  <g stroke="#5f7d8b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" marker-end="url(#arrow)">
    <path d="M156 141h20"/>
    <path d="M288 141h20"/>
    <path d="M420 141h20"/>
  </g>

  <g>
    <rect x="78" y="206" width="484" height="86" rx="18" fill="#f8fbfd" stroke="#dfe8ee" stroke-width="1.5"/>
    <text x="320" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1f3b4d">Final output</text>
    <text x="320" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f7d8b">survival curve or risk estimate for each patient</text>

    <path d="M118 272c28-11 56-18 86-19 26-1 50 4 74 13 18 7 33 12 53 12 21 0 40-5 63-15 27-11 54-18 86-19 23-1 45 3 68 11" fill="none" stroke="#b8d6e6" stroke-width="10" stroke-linecap="round" opacity="0.22"/>
    <path d="M118 272c28-11 56-18 86-19 26-1 50 4 74 13 18 7 33 12 53 12 21 0 40-5 63-15 27-11 54-18 86-19 23-1 45 3 68 11" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
    <text x="92" y="268" transform="rotate(-90 92 268)" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f7d8b">Survival</text>
    <text x="564" y="293" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#5f7d8b">Time</text>
  </g>
</svg>